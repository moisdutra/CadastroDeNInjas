<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title th:text="'Ninja — ' + ${ninja.nome}">Detalhes do Ninja</title>
    <link rel="stylesheet" th:href="@{/css/ninja-detalhes.css}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Nunito:wght@400;500;600&display=swap');

        /* ─── Reset & Variáveis ─────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-page:         #0d1117;
            --bg-card:         #161b22;
            --bg-header:       #1c2333;
            --bg-section:      #1a2030;
            --bg-row-alt:      #1e2535;
            --accent-red:      #e05252;
            --accent-orange:   #e07b2c;
            --accent-gold:     #c9922a;
            --text-primary:    #e6edf3;
            --text-secondary:  #8b949e;
            --text-muted:      #484f58;
            --border-subtle:   rgba(255, 255, 255, 0.06);
            --border-accent:   rgba(224, 82, 82, 0.4);
            --rank-genin:      #4fa84f;
            --rank-chunin:     #4a90d9;
            --rank-jonin:      #9b59b6;
            --rank-anbu:       #e05252;
            --rank-kage:       #c9922a;
            --radius-sm:  6px;
            --radius-md:  10px;
            --radius-lg:  16px;
            --radius-xl:  22px;
        }

        /* ─── Base ──────────────────────────────────────────────── */
        body {
            background-color: var(--bg-page);
            background-image:
                    radial-gradient(ellipse at 15%  5%, rgba(224, 82, 82, 0.07) 0%, transparent 50%),
                    radial-gradient(ellipse at 85% 95%, rgba(74, 144, 217, 0.05) 0%, transparent 50%);
            color: var(--text-primary);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            padding: 2.5rem 2rem;
        }

        /* ─── Topbar de navegação ───────────────────────────────── */
        .topbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .btn-voltar {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            border-radius: var(--radius-sm);
            font-family: 'Nunito', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--text-secondary);
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            transition: all 0.15s ease;
        }

        .btn-voltar:hover {
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.15);
            background: var(--bg-header);
        }

        .btn-voltar svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .topbar-divider {
            width: 1px;
            height: 1.4rem;
            background: var(--border-subtle);
        }

        .breadcrumb {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.15s;
        }

        .breadcrumb a:hover { color: var(--text-primary); }

        .breadcrumb span { color: var(--text-muted); }

        .breadcrumb .current {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* ─── Layout principal ──────────────────────────────────── */
        .detail-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        /* ─── Card lateral (foto + identidade) ─────────────────── */
        .profile-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-subtle);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45),
            inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 2rem;
        }

        .profile-card-banner {
            height: 80px;
            background: linear-gradient(135deg,
            rgba(224, 82, 82, 0.25) 0%,
            rgba(224, 123, 44, 0.15) 50%,
            rgba(74, 144, 217, 0.1) 100%);
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
        }

        .profile-card-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 10px,
                    rgba(255,255,255,0.012) 10px,
                    rgba(255,255,255,0.012) 20px
            );
        }

        .profile-card-body {
            padding: 0 1.5rem 1.75rem;
            text-align: center;
        }

        .avatar-wrapper {
            margin-top: -40px;
            margin-bottom: 1rem;
        }

        .avatar-wrapper img {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-card);
            outline: 2px solid var(--border-accent);
            display: block;
            margin: 0 auto;
        }

        .profile-name {
            font-family: 'Cinzel', serif;
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.04em;
            margin-bottom: 0.5rem;
        }

        .rank-badge {
            display: inline-block;
            padding: 4px 13px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 1.25rem;
        }

        .rank-genin  { background: rgba(79,168,79,.15);   color: var(--rank-genin);  border: 1px solid rgba(79,168,79,.3); }
        .rank-chunin { background: rgba(74,144,217,.15);  color: var(--rank-chunin); border: 1px solid rgba(74,144,217,.3); }
        .rank-jonin  { background: rgba(155,89,182,.15);  color: var(--rank-jonin);  border: 1px solid rgba(155,89,182,.3); }
        .rank-anbu   { background: rgba(224,82,82,.15);   color: var(--rank-anbu);   border: 1px solid rgba(224,82,82,.3); }
        .rank-kage   { background: rgba(201,146,42,.15);  color: var(--rank-kage);   border: 1px solid rgba(201,146,42,.3); }

        .profile-divider {
            height: 1px;
            background: var(--border-subtle);
            margin: 0 0 1.25rem;
        }

        .profile-meta {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .meta-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.82rem;
        }

        .meta-icon {
            width: 30px;
            height: 30px;
            border-radius: var(--radius-sm);
            background: var(--bg-section);
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .meta-icon svg {
            width: 14px;
            height: 14px;
            stroke: var(--text-muted);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .meta-label {
            color: var(--text-muted);
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            display: block;
            line-height: 1;
            margin-bottom: 2px;
        }

        .meta-value {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.85rem;
        }

        .profile-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-action {
            display: block;
            width: 100%;
            padding: 9px 0;
            border-radius: var(--radius-sm);
            font-family: 'Nunito', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            letter-spacing: 0.04em;
            transition: all 0.15s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .btn-editar {
            background: rgba(201, 146, 42, 0.12);
            color: var(--accent-gold);
            border-color: rgba(201, 146, 42, 0.3);
        }

        .btn-editar:hover {
            background: rgba(201, 146, 42, 0.22);
            border-color: rgba(201, 146, 42, 0.55);
        }

        .btn-deletar {
            background: rgba(224, 82, 82, 0.1);
            color: var(--accent-red);
            border-color: rgba(224, 82, 82, 0.25);
        }

        .btn-deletar:hover {
            background: rgba(224, 82, 82, 0.2);
            border-color: rgba(224, 82, 82, 0.5);
        }

        /* ─── Coluna de conteúdo ────────────────────────────────── */
        .detail-content {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* ─── Seção genérica ────────────────────────────────────── */
        .section-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3),
            inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 1rem 1.4rem;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-accent);
        }

        .section-header svg {
            width: 15px;
            height: 15px;
            stroke: var(--accent-red);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        .section-body {
            padding: 1.4rem;
        }

        /* ─── Grid de atributos ─────────────────────────────────── */
        .attr-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .attr-item {
            background: var(--bg-section);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-subtle);
            padding: 0.9rem 1.1rem;
            transition: border-color 0.15s, background 0.15s;
        }

        .attr-item:hover {
            border-color: rgba(255, 255, 255, 0.1);
            background: var(--bg-row-alt);
        }

        .attr-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .attr-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .attr-value.highlight {
            color: var(--accent-red);
            font-family: 'Cinzel', serif;
            font-size: 1.05rem;
        }

        /* ─── Card de missão ────────────────────────────────────── */
        .missao-card {
            background: var(--bg-section);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-subtle);
            padding: 1.1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1.1rem;
            transition: border-color 0.15s;
        }

        .missao-card:hover {
            border-color: rgba(201, 146, 42, 0.3);
        }

        .missao-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            background: rgba(201, 146, 42, 0.1);
            border: 1px solid rgba(201, 146, 42, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .missao-icon svg {
            width: 20px;
            height: 20px;
            stroke: var(--accent-gold);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .missao-nome {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .missao-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dif-badge {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 12px;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .dif-facil  { background: rgba(79,168,79,.15);   color: var(--rank-genin);  border: 1px solid rgba(79,168,79,.3); }
        .dif-media  { background: rgba(74,144,217,.15);  color: var(--rank-chunin); border: 1px solid rgba(74,144,217,.3); }
        .dif-dificil{ background: rgba(224,82,82,.15);   color: var(--rank-anbu);   border: 1px solid rgba(224,82,82,.3); }
        .dif-s      { background: rgba(201,146,42,.15);  color: var(--rank-kage);   border: 1px solid rgba(201,146,42,.3); }

        .sem-missao {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 1rem;
            background: var(--bg-section);
            border-radius: var(--radius-md);
            border: 1px dashed var(--border-subtle);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-style: italic;
        }

        /* ─── Responsivo ────────────────────────────────────────── */
        @media (max-width: 860px) {
            .detail-layout {
                grid-template-columns: 1fr;
            }

            .profile-card {
                position: static;
            }

            .attr-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            body { padding: 1.25rem 1rem; }

            .attr-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

<!-- ── Topbar ─────────────────────────────────────────── -->
<div class="topbar">
    <a class="btn-voltar" th:href="@{/ninjas/ui/listar}">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Voltar
    </a>
    <div class="topbar-divider"></div>
    <nav class="breadcrumb">
        <a th:href="@{/ninjas/ui/listar}">Ninjas</a>
        <span>›</span>

        <span class="current" th:text="${ninja.nome}">Nome do Ninja</span>
    </nav>
</div>

<!-- ── Layout ─────────────────────────────────────────── -->
<div class="detail-layout">

    <!-- ── Card lateral: perfil ───────────────────────── -->
    <aside class="profile-card">
        <div class="profile-card-banner"></div>
        <div class="profile-card-body">

            <div class="avatar-wrapper">
                <img th:src="${ninja.imgUrl}"
                     th:alt="${ninja.nome}"
                     width="88" height="88">
            </div>

            <p class="profile-name" th:text="${ninja.nome}">Nome</p>

            <!--
                Adicione th:classappend para colorir o badge pelo rank:
                th:classappend="${ninja.rank == 'Genin'}   ? 'rank-genin'  :
                                (${ninja.rank == 'Chunin'} ? 'rank-chunin' :
                                (${ninja.rank == 'Jonin'}  ? 'rank-jonin'  :
                                (${ninja.rank == 'ANBU'}   ? 'rank-anbu'   : 'rank-kage')))"
            -->
            <span class="rank-badge" th:text="${ninja.rank}">Rank</span>

            <div class="profile-divider"></div>

            <div class="profile-meta">

                <div class="meta-row">
                    <div class="meta-icon">
                        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <div>
                        <span class="meta-label">ID</span>
                        <span class="meta-value" th:text="'#' + ${ninja.id}">#001</span>
                    </div>
                </div>

                <div class="meta-row">
                    <div class="meta-icon">
                        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    </div>
                    <div>
                        <span class="meta-label">Idade</span>
                        <span class="meta-value" th:text="${ninja.idade} + ' anos'">16 anos</span>
                    </div>
                </div>

                <div class="meta-row">
                    <div class="meta-icon">
                        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </div>
                    <div>
                        <span class="meta-label">Email</span>
                        <span class="meta-value" th:text="${ninja.email}">email@konoha.jp</span>
                    </div>
                </div>

            </div>

            <div class="profile-actions">
                <a class="btn-action btn-editar"
                   th:href="@{/ninjas/ui/editar/{id}(id=${ninja.id})}">
                    ✎ Alterar
                </a>
                <a class="btn-action btn-deletar"
                   th:href="@{/ninjas/ui/deletar/{id}(id=${ninja.id})}">
                    ✕ Deletar
                </a>
            </div>

        </div>
    </aside>

    <!-- ── Coluna de conteúdo ──────────────────────────── -->
    <div class="detail-content">

        <!-- Informações gerais -->
        <div class="section-card">
            <div class="section-header">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span class="section-title">Informações Gerais</span>
            </div>
            <div class="section-body">
                <div class="attr-grid">

                    <div class="attr-item">
                        <div class="attr-label">Nome completo</div>
                        <div class="attr-value" th:text="${ninja.nome}">—</div>
                    </div>

                    <div class="attr-item">
                        <div class="attr-label">ID</div>
                        <div class="attr-value highlight" th:text="'#' + ${ninja.id}">—</div>
                    </div>

                    <div class="attr-item">
                        <div class="attr-label">Idade</div>
                        <div class="attr-value" th:text="${ninja.idade} + ' anos'">—</div>
                    </div>

                    <div class="attr-item">
                        <div class="attr-label">Email</div>
                        <div class="attr-value" th:text="${ninja.email}">—</div>
                    </div>

                    <div class="attr-item">
                        <div class="attr-label">Rank</div>
                        <div class="attr-value">
                            <span class="rank-badge" th:text="${ninja.rank}">—</span>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Missão atual -->
        <div class="section-card">
            <div class="section-header">
                <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <span class="section-title">Missão Atual</span>
            </div>
            <div class="section-body">

                <div class="missao-card" th:if="${ninja.missoes != null}">
                    <div class="missao-icon">
                        <svg viewBox="0 0 24 24"><path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/><path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M9.5 14c.83 0 1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5S8 21.33 8 20.5v-5c0-.83.67-1.5 1.5-1.5z"/><path d="M3.5 14H5v1.5c0 .83-.67 1.5-1.5 1.5S2 16.33 2 15.5 2.67 14 3.5 14z"/><path d="M14 14.5c0-.83.67-1.5 1.5-1.5h5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-5c-.83 0-1.5-.67-1.5-1.5z"/><path d="M15.5 19H14v1.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5-.67-1.5-1.5-1.5z"/><path d="M10 9.5C10 8.67 9.33 8 8.5 8h-5C2.67 8 2 8.67 2 9.5S2.67 11 3.5 11h5c.83 0 1.5-.67 1.5-1.5z"/><path d="M8.5 5H10V3.5C10 2.67 9.33 2 8.5 2S7 2.67 7 3.5 7.67 5 8.5 5z"/></svg>
                    </div>
                    <div>
                        <div class="missao-nome" th:text="${ninja.missoes.nome}">Nome da missão</div>
                        <div class="missao-meta">
                            <span>Dificuldade:</span>
                            <!--
                                Adicione th:classappend para colorir pelo nível:
                                th:classappend="${ninja.missoes.dificuldade == 'Fácil'}    ? 'dif-facil'  :
                                               (${ninja.missoes.dificuldade == 'Média'}    ? 'dif-media'  :
                                               (${ninja.missoes.dificuldade == 'Difícil'}  ? 'dif-dificil': 'dif-s'))"
                            -->
                            <span class="dif-badge"
                                  th:text="${ninja.missoes.dificuldade}">—</span>
                        </div>
                    </div>
                </div>

                <div class="sem-missao" th:if="${ninja.missoes == null}">
                    Nenhuma missão cadastrada para este ninja.
                </div>

            </div>
        </div>

    </div>
    <!-- fim detail-content -->

</div>
<!-- fim detail-layout -->

</body>
</html>
